name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Test --list
      run: python gitignore-gen.py --list

    - name: Test fetch Python
      run: python gitignore-gen.py Python

    - name: Test error handling
      run: |
        if python gitignore-gen.py NonExistentLanguage; then
          echo "Expected failure but succeeded"
          exit 1
        else
          echo "Correctly handled unknown language"
        fi
